<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>tgrid</title>
<link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
<style>
  :root, [data-theme="dark"] {
    --bg-base: #0e0e0e;
    --bg-surface: #1a1a1a;
    --bg-panel: #141414;
    --border: #242424;
    --border-light: #303030;
    --accent: #4ade80;
    --accent-glow: rgba(74, 222, 128, 0.15);
    --accent-hover: rgba(74, 222, 128, 0.1);
    --accent-selection: rgba(74, 222, 128, 0.2);
    --accent-highlight: rgba(74, 222, 128, 0.35);
    --text-primary: #e5e6e5;
    --text-secondary: #cccccc;
    --text-muted: #707070;
    --text-dim: #4e4e4e;
    --text-dark: #414141;
    --text-darker: #373737;
    --text-index: #444444;
    --danger: #f87171;
    --bg-interactive: #222222;
    --shadow-dropdown: rgba(0, 0, 0, 0.5);
    --modal-backdrop: rgba(0, 0, 0, 0.6);
  }

  [data-theme="light"] {
    --bg-base: #ebebeb;
    --bg-surface: #f2f2f2;
    --bg-panel: #fafafa;
    --border: #d7d7d7;
    --border-light: #c4c4c4;
    --accent: #15803d;
    --accent-glow: rgba(21, 128, 61, 0.12);
    --accent-hover: rgba(21, 128, 61, 0.08);
    --accent-selection: rgba(21, 128, 61, 0.15);
    --accent-highlight: rgba(21, 128, 61, 0.25);
    --text-primary: #1e1e1e;
    --text-secondary: #3e3e3e;
    --text-muted: #808080;
    --text-dim: #727272;
    --text-dark: #8e8e8e;
    --text-darker: #a3a3a3;
    --text-index: #aaaaaa;
    --danger: #dc2626;
    --bg-interactive: #e0e0e0;
    --shadow-dropdown: rgba(0, 0, 0, 0.12);
    --modal-backdrop: rgba(0, 0, 0, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    color: var(--text-secondary);
    font-family: -apple-system, 'SF Mono', 'Menlo', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }

  /* Title bar */
  .titlebar {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-light);
    padding: 8px 16px 8px 80px; /* space for traffic lights */
    display: flex;
    align-items: center;
    justify-content: space-between;
    -webkit-app-region: drag;
    flex-shrink: 0;
    height: 38px;
  }
  .titlebar h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 1px;
    -webkit-app-region: drag;
  }
  .titlebar h1 .accent { color: var(--accent); }
  .titlebar-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  .grid-indicator {
    background: var(--bg-interactive);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text-dim);
    -webkit-app-region: no-drag;
  }

  /* Grid container */
  .grid {
    flex: 1;
    display: grid;
    gap: 4px;
    padding: 4px;
    background: var(--bg-base);
    overflow: hidden;
  }

  /* Terminal panel */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
    min-height: 0;
  }
  .panel.active {
    border-color: var(--panel-color, var(--accent));
    box-shadow: 0 0 12px color-mix(in srgb, var(--panel-color, var(--accent)) 15%, transparent);
  }
  .panel.fullscreen {
    position: fixed;
    top: 38px;
    left: 0;
    right: 0;
    bottom: 24px;
    z-index: 100;
    border-radius: 0;
  }

  /* Panel header */
  .panel-header {
    background: var(--bg-surface);
    padding: 3px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    flex-shrink: 0;
    height: 24px;
    position: relative;
  }
  .panel-header::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--panel-color, transparent);
    border-radius: 2px 0 0 0;
  }
  .panel-header .name {
    color: var(--text-primary);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-header .index {
    color: var(--text-index);
    font-size: 10px;
    margin-left: 4px;
  }
  .panel-header-right {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  /* Terminal content area */
  .terminal-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .terminal-wrap .xterm {
    height: 100%;
  }

  /* Character overlay — THE CORE FEATURE */
  .character-overlay {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 35%;
    height: 70%;
    pointer-events: none;
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    transform: scale(1);
  }
  .panel.active .character-overlay {
    transform: scale(1.02);
  }
  .character-overlay::before {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 100%;
    height: 25%;
    background: linear-gradient(to top, var(--bg-panel), transparent);
    pointer-events: none;
    z-index: 0;
    border-radius: inherit;
  }
  .character-overlay img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 2;
  }

  /* Ensure xterm doesn't clip the overlay */
  .terminal-wrap .xterm,
  .terminal-wrap .xterm-viewport,
  .terminal-wrap .xterm-screen {
    z-index: 1;
  }

  /* Status bar */
  .statusbar {
    background: var(--bg-surface);
    border-top: 1px solid var(--border-light);
    padding: 3px 16px;
    font-size: 11px;
    color: var(--text-darker);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 24px;
  }
  #status-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .statusbar .key { color: var(--accent); }
  .help-btn {
    background: none;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 10px;
    padding: 0 5px;
    cursor: pointer;
    line-height: 18px;
    transition: border-color 0.15s, color 0.15s;
  }
  .help-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Theme toggle button */
  .theme-toggle {
    background: var(--bg-interactive);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: border-color 0.15s, color 0.15s;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Panel menu button (... ) */
  .panel-menu-btn {
    background: none;
    border: none;
    color: var(--text-dark);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 24px;
    letter-spacing: 1px;
    -webkit-app-region: no-drag;
    transition: color 0.15s;
  }
  .panel-menu-btn:hover { color: var(--accent); }

  /* Titlebar presets button */
  .presets-btn {
    background: var(--bg-interactive);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: border-color 0.15s, color 0.15s;
  }
  .presets-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Animation keyframes */
  @keyframes dropdown-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes backdrop-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Shared dropdown */
  .dropdown {
    position: absolute;
    background: var(--bg-interactive);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    box-shadow: 0 8px 32px var(--shadow-dropdown);
    z-index: 200;
    min-width: 160px;
    max-height: 300px;
    overflow-y: auto;
    padding: 4px 0;
    animation: dropdown-in 150ms cubic-bezier(0.25, 1, 0.5, 1);
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    transition: background 0.1s;
    white-space: nowrap;
  }
  .dropdown-item:hover,
  .dropdown-item.focused { background: var(--accent-hover); }
  .dropdown-item.active { color: var(--accent); }
  .dropdown-item img {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .dropdown-item .check {
    width: 16px;
    text-align: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .dropdown-item .edit-icon {
    margin-left: auto;
    color: var(--text-dark);
    font-size: 11px;
    padding: 2px 4px;
    border-radius: 3px;
    transition: color 0.1s, background 0.1s;
  }
  .dropdown-item .edit-icon:hover {
    color: var(--accent);
    background: var(--accent-hover);
  }
  .dropdown-separator {
    height: 1px;
    background: var(--border-light);
    margin: 4px 0;
  }
  .dropdown-action {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--accent);
    transition: background 0.1s;
  }
  .dropdown-action:hover { background: var(--accent-hover); }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: var(--modal-backdrop);
    z-index: 250;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: backdrop-in 200ms cubic-bezier(0.25, 1, 0.5, 1);
  }
  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 24px;
    width: 360px;
    z-index: 300;
    animation: modal-in 200ms cubic-bezier(0.25, 1, 0.5, 1);
  }
  .modal p {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .modal h3 {
    color: var(--text-primary);
    margin-bottom: 16px;
    font-size: 14px;
  }
  .modal label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .modal input[type="text"] {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 8px 10px;
    color: var(--text-secondary);
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 12px;
  }
  .modal input[type="text"]:focus {
    border-color: var(--accent);
    outline: none;
  }
  .modal-image-picker {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .modal-image-picker img {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
  }
  .modal-image-picker .placeholder {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    background: var(--bg-panel);
    border: 1px dashed var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dark);
    font-size: 18px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions-left {
    margin-right: auto;
  }
  .btn {
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border-light);
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary {
    background: var(--accent);
    color: var(--bg-base);
    border-color: var(--accent);
    font-weight: 600;
  }
  [data-theme="light"] .btn-primary {
    background: #ffffff;
    color: var(--accent);
    border-color: var(--accent);
    border-width: 2px;
    font-weight: 700;
  }
  .btn-secondary {
    background: var(--bg-interactive);
    color: var(--text-secondary);
  }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }

  /* Grid picker overlay */
  .grid-picker-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-base);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid-picker {
    text-align: center;
  }
  .grid-picker h2 {
    color: var(--text-primary);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .grid-picker-cells {
    display: inline-grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }
  .grid-cell {
    width: 40px;
    height: 32px;
    background: var(--bg-interactive);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .grid-cell.highlighted {
    background: var(--accent-selection);
    border-color: var(--accent);
  }
  .grid-cell.selected {
    background: var(--accent-highlight);
    border-color: var(--accent);
  }
  .grid-picker-info {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 16px;
    height: 24px;
  }
  .grid-picker-info .size {
    color: var(--accent);
    font-weight: 600;
  }
  .grid-picker .btn-start {
    padding: 8px 32px;
    font-size: 14px;
  }
  .grid-picker .btn-start:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Grid indicator as button */
  .grid-indicator {
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .grid-indicator:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Grid resize dropdown */
  .grid-resize-dropdown {
    padding: 12px;
  }
  .grid-resize-cells {
    display: inline-grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .grid-resize-cell {
    width: 28px;
    height: 22px;
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .grid-resize-cell.highlighted {
    background: var(--accent-selection);
    border-color: var(--accent);
  }
  .grid-resize-cell.current {
    background: var(--accent-highlight);
    border-color: var(--accent);
  }
  .grid-resize-info {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 8px;
    text-align: center;
  }

  /* Color palette picker in modal */
  .color-palette {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
    padding: 0;
    outline: none;
    font-family: inherit;
  }
  .color-swatch:hover {
    transform: scale(1.15);
  }
  .color-swatch:focus-visible {
    box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px var(--accent);
  }
  .color-swatch.selected {
    border-color: var(--text-primary);
  }
  .color-swatch.selected::after {
    content: '\2713';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: var(--text-primary);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
  }
  [data-theme="light"] .color-swatch.selected::after {
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }
  .color-swatch.none-swatch {
    background: var(--bg-interactive);
    border: 2px dashed var(--border-light);
  }
  .color-swatch.none-swatch.selected {
    border-color: var(--text-primary);
    border-style: solid;
  }
  .color-swatch.none-swatch.selected::after {
    color: var(--text-muted);
    text-shadow: none;
  }

  /* Color dot in dropdown items */
  .preset-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Drag and drop states */
  .panel-header[draggable="true"] {
    cursor: grab;
  }
  .panel-header.dragging {
    opacity: 0.5;
  }
  .panel-header.drag-over {
    border-top: 2px solid var(--accent);
    padding-top: 1px;
  }

  /* Onboarding hint for empty-preset state */
  .onboarding-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  .onboarding-hint p {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .onboarding-hint .key { color: var(--accent); }

  /* Utility classes for JS-created elements */
  .accent-text { color: var(--accent); }
  .panel-header-right {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  /* Accessibility: respect reduced motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="titlebar">
  <h1>t<span class="accent">grid</span></h1>
  <div class="titlebar-controls">
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">Dark ▾</button>
    <button class="presets-btn" id="presets-btn" aria-haspopup="menu">Presets ▾</button>
    <button class="grid-indicator" id="grid-indicator" aria-label="Grid size" aria-haspopup="menu"></button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="statusbar">
  <span id="status-left" role="status" aria-live="polite"></span>
  <span id="status-right"><span id="panel-count"></span> <button class="help-btn" id="help-btn" aria-label="Keyboard shortcuts">?</button></span>
</div>

<script src="./renderer.js"></script>
</body>
</html>
